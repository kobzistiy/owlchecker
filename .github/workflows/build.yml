name: Build OwenStChecker
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 6.0.x
    - name: Build
      run: dotnet publish OwenStChecker.csproj -c Release -r win-x64 --self-contained false -o ./publish
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OwenStChecker
        path: ./publish/OwenStChecker.exe
